<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Glittarzz</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- Announcement -->

    <div class="announcement">
      <marquee id="announcementText"></marquee>
    </div>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
      <div class="container">
        <!-- Logo + Text Combined -->
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img
            src="images/Glittarz logo 2.png"
            alt="GLITTARZZ Logo"
            class="navbar-logo me-2"
          />
          <span class="logo-text">GLITTARZZ Variety Stores</span>
        </a>
        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="#"> Home </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#"> Products </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#"> Contact </a>
            </li>

            <li class="nav-item">
              <a class="nav-link cart-btn" href="#">
                🛒
                <span id="cartCount">0</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Hero -->

    <section class="hero">
      <div class="overlay"></div>

      <div class="hero-content">
        <h1>Luxury Shopping Experience</h1>

        <p>Premium Electronics, Fashion & Lifestyle Products</p>

        <a href="#products" class="btn btn-warning btn-lg"> Shop Now </a>
      </div>
    </section>

    <!-- Categories -->

    <section class="container mt-5">
      <div class="text-center">
        <button class="category-btn active" data-category="All Collections">
          All Collections
        </button>

        <button class="category-btn" data-category="Electronics">
          Electronics
        </button>

        <button class="category-btn" data-category="Phones & Tablets">
          Phones & Tablets
        </button>

        <button class="category-btn" data-category="Computing">
          Computing
        </button>

        <button class="category-btn" data-category="Fashion">Fashion</button>

        <button class="category-btn" data-category="Home & Office">
          Home & Office
        </button>
      </div>
    </section>

    <!-- Products -->

    <section id="products" class="container py-5">
      <div class="row" id="productContainer"></div>
    </section>

    <script src="js/main.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
